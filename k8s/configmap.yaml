apiVersion: v1
kind: ConfigMap
metadata:
  name: smart-assistant-config
  namespace: smart-assistant
data:
  DATABASE_URL: "sqlite:///./data.db"
  REDIS_HOST: "redis.smart-assistant.svc.cluster.local"
  REDIS_PORT: "6379"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"