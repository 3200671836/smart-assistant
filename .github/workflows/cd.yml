name: CD - Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'   # 版本发布触发部署

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Job 1: 构建并推送 Docker 镜像
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ '3200671836' }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: 部署到生产环境 (Kubernetes)
  # ============================================
  deploy-k8s:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://smart-assistant.example.com

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置 Kubernetes 上下文
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: 部署应用
        run: |
          # 更新镜像标签
          sed -i "s|image:.*|image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:main|g" k8s/deployment.yaml
          
          # 应用配置
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: 等待部署就绪
        run: |
          kubectl rollout status deployment/smart-assistant -n smart-assistant --timeout=300s

      - name: 健康检查
        run: |
          sleep 10
          curl -f https://smart-assistant.example.com/api/health || exit 1

  # ============================================
  # Job 3: 部署到 Docker Swarm (备选方案)
  # ============================================
  deploy-swarm:
    name: 🐳 Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.smart-assistant.example.com

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker 上下文
        run: |
          echo "${{ secrets.SWARM_SSH_KEY }}" > swarm_key
          chmod 600 swarm_key
          
          docker context create remote-swarm \
            --docker "host=ssh://${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }}:22" \
            --description "Remote Docker Swarm"
          
          docker context use remote-swarm

      - name: 部署到 Swarm
        run: |
          # 拉取最新镜像
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:main
          
          # 部署服务
          docker stack deploy -c docker-compose.prod.yml smart-assistant

      - name: 验证部署
        run: |
          sleep 30
          curl -f https://staging.smart-assistant.example.com/api/health || exit 1

  # ============================================
  # Job 4: 通知和监控
  # ============================================
  notify:
    name: 📢 Notify & Monitor
    runs-on: ubuntu-latest
    needs: [deploy-k8s, deploy-swarm]
    if: always()
    steps:
      - name: 发送部署通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          username: 'Deploy Bot'
          icon_emoji: ':rocket:'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 创建部署记录
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            console.log('Deployment created:', deployment.data.id);

      - name: 更新部署状态
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref
            });
            
            if (deployments.data.length > 0) {
              const deploymentId = deployments.data[0].id;
              const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
              
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deploymentId,
                state: state,
                environment_url: 'https://smart-assistant.example.com',
                description: 'Deployment completed'
              });
            }