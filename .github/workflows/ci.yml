name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Job 1: 代码质量检查
  # ============================================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install ruff black mypy
          pip install -r requirements.txt

      - name: Ruff 代码检查
        run: ruff check app/ --output-format=github || true

      - name: Black 格式检查
        run: black --check app/ --diff || true

  # ============================================
  # Job 2: 自动化测试
  # ============================================
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 运行测试
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || 'sk-test' }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DATABASE_URL: sqlite:///./test.db
        run: |
          # 运行测试，确保覆盖率数据生成
          echo "运行测试以生成覆盖率数据..."
          python -m pytest tests/test_simple.py -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html \
            --junitxml=test-results.xml \
            -W ignore::DeprecationWarning
          
          # 显示覆盖率报告
          echo "覆盖率报告:"
          python -m coverage report || echo "无法生成覆盖率报告"

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage.xml
            test-results.xml
            htmlcov/

      - name: 覆盖率检查 (≥60%)
        run: |
          if [ -f coverage.xml ]; then
            pip install coverage-badge
            coverage report --fail-under=60 || echo "覆盖率未达标 (≥60%)，但继续执行"
          else
            echo "未找到覆盖率数据，跳过覆盖率检查"
          fi

  # ============================================
  # Job 3: Docker 构建验证
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: smart-assistant:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 运行容器健康检查
        run: |
          # 启动容器
          docker run -d --name sa-test \
            -e DASHSCOPE_API_KEY=test \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            -e DATABASE_URL=sqlite:///./data.db \
            -p 8000:8000 \
            smart-assistant:ci-${{ github.run_number }}
          
          # 等待应用启动（最多30秒）
          echo "等待应用启动..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "应用启动成功！"
              break
            fi
            echo "等待应用启动... ($i/30)"
            sleep 1
          done
          
          # 检查应用状态
          if curl -s -f http://localhost:8000/api/health; then
            echo "健康检查通过"
          else
            echo "健康检查失败，显示容器日志："
            docker logs sa-test
            exit 1
          fi

      - name: 清理容器
        if: always()
        run: |
          docker stop sa-test || true
          docker rm sa-test || true

  # ============================================
  # Job 4: 安全扫描
  # ============================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 bandit
        run: pip install bandit

      - name: Bandit 安全扫描
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: 上传安全报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json